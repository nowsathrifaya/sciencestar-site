<style>
:root{--bg:#080f1e;--bg2:#0d1629;--card:#0f1c30;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#e8edf5;--muted:rgba(232,237,245,.5);--dim:rgba(232,237,245,.22);--sky:#38bdf8;--sky2:#0ea5e9;--amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--green:#34d399;--p3:#fb923c;--p5:#34d399;--r:12px;--rl:18px;--rxl:24px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 clamp(16px,5%,56px);background:rgba(8,15,30,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-brand span{color:var(--sky)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-links a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:8px;transition:all .15s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--sky);background:rgba(56,189,248,.12)}
.npill{padding:5px 12px!important;border-radius:50px!important;font-weight:700!important;font-size:11px!important;color:#fff!important}
.np3{background:var(--p3)!important}.npsle{background:var(--sky2)!important}.nsec{background:#7c3aed!important}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;margin-left:8px;border:none;background:none;flex-shrink:0}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(8,15,30,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px clamp(16px,5%,56px);z-index:99;flex-direction:column;gap:6px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:8px;transition:all .15s}
.mobile-menu a:hover{color:#fff;background:rgba(255,255,255,.08)}
.mm-row{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.mm-divider{height:1px;background:var(--border);margin:6px 0}
.mobile-menu .mpill{color:#fff!important;border-radius:50px;padding:8px 16px!important;font-weight:700!important}
.mobile-menu .mp3{background:var(--p3)}.mobile-menu .mpsle{background:var(--sky2)}.mobile-menu .msec{background:#7c3aed}
.wrap{max-width:900px;margin:0 auto;padding:80px clamp(16px,5%,48px) 60px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px}
.state-icon{font-size:52px}.state-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff}
.state-sub{font-size:14px;color:var(--muted);max-width:380px;line-height:1.6}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 26px;background:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#1f2937;cursor:pointer;transition:all .2s}
.btn-google:hover{background:#f1f5f9;transform:translateY(-1px)}
.btn-google img{width:18px;height:18px}
/* HERO */
.page-hero{text-align:center;padding:36px 0 28px}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.page-hero h1{font-family:'Sora',sans-serif;font-size:clamp(22px,4vw,38px);font-weight:800;color:#fff;margin-bottom:8px}
.page-hero h1 span{color:var(--green)}
.page-hero p{font-size:14px;color:var(--muted);max-width:440px;margin:0 auto}
/* TWO COLUMNS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
/* CARDS */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:24px}
.sc-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sc-icon{font-size:24px}
.sc-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff}
.sc-sub{font-size:12px;color:var(--muted);margin-top:1px}
/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:var(--r);color:#fff;font-family:inherit;font-size:14px;transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--green)}
.form-input::placeholder{color:var(--dim)}
select.form-input{cursor:pointer}
.form-input option{background:#0d1629}
/* EMOJI PICKER */
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.emoji-btn{width:38px;height:38px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-btn:hover{border-color:var(--green);background:rgba(52,211,153,.1)}
.emoji-btn.selected{border-color:var(--green);background:rgba(52,211,153,.15)}
/* BUTTONS */
.btn-primary{width:100%;padding:13px;background:var(--green);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:#0d1629;cursor:pointer;transition:all .18s;margin-top:4px}
.btn-primary:hover{background:#10b981;transform:translateY(-1px)}
.btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1.5px solid var(--border2);border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;margin-top:8px}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
/* JOIN CODE */
.join-code-wrap{display:flex;gap:10px}
.join-code-input{flex:1;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:var(--r);color:#fff;font-family:inherit;font-size:18px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;outline:none;transition:border-color .2s}
.join-code-input:focus{border-color:var(--green)}
.btn-join{padding:11px 18px;background:var(--sky2);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-join:hover{background:#0284c7}
/* MY GROUPS */
.my-groups{margin-bottom:28px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .22s}
.group-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.25)}
.gc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.gc-emoji{font-size:32px;line-height:1}
.gc-info{flex:1;min-width:0}
.gc-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-subject{font-size:11px;color:var(--muted);margin-top:2px}
.gc-code{font-size:11px;font-weight:700;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);border-radius:50px;padding:2px 10px;display:inline-block}
.gc-stats{display:flex;gap:16px;margin-top:10px}
.gc-stat{font-size:12px;color:var(--muted)}
.gc-stat strong{color:#fff;font-weight:700}
.gc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;background:rgba(52,211,153,.15);color:var(--green)}
/* GROUP DETAIL */
.group-detail{display:none}
.group-detail.active{display:block}
.gd-header{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:20px}
.gd-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.gd-emoji{font-size:40px}
.gd-info{flex:1}
.gd-name{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:#fff}
.gd-meta{font-size:13px;color:var(--muted);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.gd-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:8px 16px;border-radius:50px;font-family:'Sora',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;border:none;white-space:nowrap}
.btn-sm-green{background:var(--green);color:#0d1629}
.btn-sm-green:hover{background:#10b981}
.btn-sm-purple{background:var(--purple);color:#fff}
.btn-sm-purple:hover{background:#9061e5}
.btn-sm-red{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.btn-sm-red:hover{background:rgba(248,113,113,.2)}
.btn-sm-ghost{background:rgba(255,255,255,.07);border:1.5px solid var(--border2);color:var(--text)}
.btn-sm-ghost:hover{background:rgba(255,255,255,.12)}
/* GROUP TABS */
.group-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.gtab{padding:7px 16px;border-radius:50px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.gtab:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.gtab.active{background:var(--green);border-color:var(--green);color:#0d1629}
/* MEMBERS */
.members-list{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.member-row{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.member-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--sky2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.member-info{flex:1}
.member-name{font-size:13px;font-weight:700;color:#fff}
.member-sub{font-size:11px;color:var(--muted);margin-top:1px}
.member-xp{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:var(--amber)}
.member-role{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.role-owner{background:rgba(251,191,36,.15);color:var(--amber)}
.role-member{background:rgba(255,255,255,.07);color:var(--muted)}
/* LEADERBOARD TABLE */
.glb-table{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.glb-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border)}
.glb-row:last-child{border-bottom:none}
.glb-row.you{background:rgba(52,211,153,.05);border-left:3px solid var(--green)}
.glb-pos{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;min-width:28px;text-align:center}
.glb-pos.gold{color:var(--amber)}.glb-pos.silver{color:#94a3b8}.glb-pos.bronze{color:#a16207}
.glb-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--sky2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.glb-info{flex:1;min-width:0}
.glb-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glb-sub{font-size:11px;color:var(--muted)}
.glb-xp{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:var(--amber)}
/* CHALLENGES */
.challenge-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.challenge-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:14px}
.ch-icon{font-size:28px;flex-shrink:0}
.ch-info{flex:1}
.ch-title{font-size:14px;font-weight:700;color:#fff}
.ch-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:10px}
.ch-action{flex-shrink:0}
.ch-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:50px}
.ch-tag.active{background:rgba(52,211,153,.15);color:var(--green)}
.ch-tag.upcoming{background:rgba(251,191,36,.15);color:var(--amber)}
.ch-tag.ended{background:rgba(255,255,255,.07);color:var(--muted)}
/* STATS */
.group-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.gs-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.gs-val{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#fff}
.gs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
/* INVITE SHARE */
.invite-box{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.invite-code{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--green);letter-spacing:.12em}
.invite-text{flex:1;font-size:13px;color:var(--muted)}
.btn-copy{padding:8px 16px;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:50px;font-family:'Sora',sans-serif;font-size:12px;font-weight:800;color:var(--green);cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-copy:hover{background:rgba(52,211,153,.25)}
/* EMPTY */
.empty-box{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:8px}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;z-index:400;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:720px){
  .nav-links{display:none}.nav-hamburger{display:flex}
  .two-col{grid-template-columns:1fr}
  .groups-grid{grid-template-columns:1fr}
  .group-stats-grid{grid-template-columns:repeat(3,1fr)}
}
</style>

// ─── LOBBY ────────────────────────────────────────────────────────────────────

          <div class="gc-info">
            <div class="gc-name">${g.name}</div>
            <div class="gc-subject">${LEVEL_LABELS[g.subject]||'All Subjects'}</div>
          </div>

        <div class="gc-stats">

          <span class="gc-stat"><strong>${g.totalXP||0}</strong> group XP</span>

      <div class="page-badge">👥 Study Groups</div>
      <h1>Study Together, <span>Rank Together</span></h1>
      <p>Create a group with your class or friends. Share a code, track group XP, and run group challenges.</p>
    </div>

    <div class="two-col">
      <div class="section-card">
        <div class="sc-head"><span class="sc-icon">✏️</span>
          <div><div class="sc-title">Create a Group</div><div class="sc-sub">Set up your study group</div></div>
        </div>
        <div class="form-group">
          <label class="form-label">Group Name</label>
          <input class="form-input" id="groupName" placeholder="e.g. PSLE Science Warriors">
        </div>
        <div class="form-group">
          <label class="form-label">Subject Focus</label>
          <select class="form-input" id="groupSubject">
            <option value="all">All Subjects</option>
            <option value="psle">PSLE Science</option>
            <option value="bio">O-Level Biology</option>
            <option value="chem">O-Level Chemistry</option>
            <option value="phys">O-Level Physics</option>
            <option value="p3">Primary 3</option>
            <option value="p4">Primary 4</option>

          <label class="form-label">Description (optional)</label>

        <div class="sc-head"><span class="sc-icon">🔑</span>
          <div><div class="sc-title">Join a Group</div><div class="sc-sub">Enter the 6-character code</div></div>

          <label class="form-label">Group Code</label>

            <button class="btn-join" onclick="joinGroup()">Join</button>

        </div>
        <div style="margin-top:24px">
          <div class="sc-head" style="margin-bottom:0">
            <span class="sc-icon">💡</span>
            <div>

              ['🏆','Group leaderboard ranks members by their total XP'],
              ['⚔️','Create group challenges — timed quizzes only for your group'],

// ─── CREATE GROUP ─────────────────────────────────────────────────────────────
window.createGroup=async function(){
  const name   =document.getElementById('groupName').value.trim();
  const subject=document.getElementById('groupSubject').value;
  const desc   =document.getElementById('groupDesc').value.trim();
  if(!name){showToast('⚠️ Enter a group name');return;}
  const code=genCode();
  try{
    const ref=await addDoc(collection(db,'groups'),{
      name, emoji:selectedEmoji, subject, description:desc,
      code, ownerUid:currentUser.uid, ownerName:currentUser.displayName||'Owner',
      memberUids:[currentUser.uid],
      members:{[currentUser.uid]:{name:currentUser.displayName||'?',photoURL:currentUser.photoURL||'',xp:0,joinedAt:serverTimestamp()}},
      totalXP:0, challengeCount:0,
      createdAt:serverTimestamp()
    });
    showToast(`✅ Group created! Code: ${code}`,4000);
    setTimeout(()=>openGroup(ref.id),600);
  }catch(e){console.error(e);showToast('❌ Failed to create group.');}
};

// ─── JOIN GROUP ───────────────────────────────────────────────────────────────
window.joinGroup=async function(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length!==6){showToast('⚠️ Enter a 6-character code');return;}
  try{
    const q=query(collection(db,'groups'),where('code','==',code),limit(1));
    const snap=await getDocs(q);
    if(snap.empty){showToast('❌ Group not found. Check the code.');return;}
    const gid=snap.docs[0].id;
    const gdata=snap.docs[0].data();
    if((gdata.memberUids||[]).includes(currentUser.uid)){showToast('You\'re already in this group!');openGroup(gid);return;}
    // Get current user XP
    let myXP=0;
    try{const us=await getDoc(doc(db,'users',currentUser.uid));if(us.exists())myXP=us.data().xp||0;}catch(e){}
    await updateDoc(doc(db,'groups',gid),{
      memberUids:arrayUnion(currentUser.uid),
      [`members.${currentUser.uid}`]:{name:currentUser.displayName||'?',photoURL:currentUser.photoURL||'',xp:myXP,joinedAt:serverTimestamp()}
    });
    showToast(`✅ Joined "${gdata.name}"!`,3000);
    setTimeout(()=>openGroup(gid),600);
  }catch(e){console.error(e);showToast('❌ Could not join group.');}
};

// ─── OPEN GROUP ───────────────────────────────────────────────────────────────
window.openGroup=async function(gid){
  currentGroupId=gid;
  let g;
  try{
    const snap=await getDoc(doc(db,'groups',gid));
    if(!snap.exists()){showToast('Group not found.');return;}
    g={id:gid,...snap.data()};
  }catch(e){showToast('Could not load group.');return;}

  // Sync current user's XP into group
  try{
    const us=await getDoc(doc(db,'users',currentUser.uid));
    if(us.exists()){
      const myXP=us.data().xp||0;
      await updateDoc(doc(db,'groups',gid),{[`members.${currentUser.uid}.xp`]:myXP});
      if(g.members) g.members[currentUser.uid]={...(g.members[currentUser.uid]||{}),xp:myXP};
    }
  }catch(e){}

  const isOwner=g.ownerUid===currentUser.uid;
  const members=Object.entries(g.members||{});
  const totalXP=members.reduce((s,[,m])=>s+(m.xp||0),0);
  const memberCount=members.length;
  const topMember=members.sort((a,b)=>(b[1].xp||0)-(a[1].xp||0))[0];

  document.getElementById('mainWrap').innerHTML=`
    <button onclick="renderLobby()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px">
      ← All Groups
    </button>

    <div class="gd-header">
      <div class="gd-top">
        <span class="gd-emoji">${g.emoji||'🔬'}</span>
        <div class="gd-info">
          <div class="gd-name">${g.name}</div>
          <div class="gd-meta">
            <span>👥 ${memberCount} members</span>
            <span>📚 ${LEVEL_LABELS[g.subject]||'All Subjects'}</span>
            ${g.description?`<span>${g.description}</span>`:''}
          </div>
        </div>
        <div class="gd-actions">
          <a href="/arena/" class="btn-sm btn-sm-green">⚔️ Go Quiz</a>
          ${isOwner?`<button class="btn-sm btn-sm-purple" onclick="showCreateChallenge('${gid}')">⚡ Challenge</button>`:''}
          <button class="btn-sm btn-sm-ghost" onclick="copyCode('${g.code}')">📋 Copy Code</button>
          ${!isOwner?`<button class="btn-sm btn-sm-red" onclick="leaveGroup('${gid}')">Leave</button>`:''}
        </div>
      </div>
      <div class="invite-box">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Invite Code</div>
          <div class="invite-code">${g.code}</div>
        </div>
        <div class="invite-text">Share this code with friends to invite them to the group.</div>
        <button class="btn-copy" onclick="copyCode('${g.code}')">Copy</button>
      </div>
    </div>

    <div class="group-stats-grid">
      <div class="gs-card"><div class="gs-val" style="color:var(--amber)">${totalXP.toLocaleString()}</div><div class="gs-lbl">Group XP</div></div>
      <div class="gs-card"><div class="gs-val" style="color:var(--sky)">${memberCount}</div><div class="gs-lbl">Members</div></div>
      <div class="gs-card"><div class="gs-val" style="color:var(--green)">${topMember?topMember[1].name.split(' ')[0]:'—'}</div><div class="gs-lbl">Top Scorer</div></div>
    </div>

    <div class="group-tabs">
      <button class="gtab ${currentGroupTab==='leaderboard'?'active':''}" onclick="switchGroupTab('leaderboard','${gid}')">🏆 Leaderboard</button>
      <button class="gtab ${currentGroupTab==='members'?'active':''}" onclick="switchGroupTab('members','${gid}')">👥 Members</button>
      <button class="gtab ${currentGroupTab==='challenges'?'active':''}" onclick="switchGroupTab('challenges','${gid}')">⚡ Challenges</button>
    </div>

    <div id="groupTabContent"></div>`;

  renderGroupTab(g, currentGroupTab);
};

function renderGroupTab(g, tab){
  currentGroupTab=tab;
  const content=document.getElementById('groupTabContent');
  if(!content) return;
  const members=Object.entries(g.members||{}).sort((a,b)=>(b[1].xp||0)-(a[1].xp||0));

  if(tab==='leaderboard'){
    content.innerHTML=`
      <div class="glb-table">
        ${members.length===0
          ?`<div class="empty-box">No members yet.</div>`
          :members.map(([uid,m],i)=>`
            <div class="glb-row ${uid===currentUser.uid?'you':''}">
              <span class="glb-pos ${posClass(i)}">${posLabel(i)}</span>
              ${m.photoURL?`<img src="${m.photoURL}" alt="" class="glb-avatar">`:`<div class="glb-avatar">${initials(m.name)}</div>`}
              <div class="glb-info">
                <div class="glb-name">${m.name}${uid===currentUser.uid?' (You)':''}</div>
                <div class="glb-sub">${getLevelName(m.xp||0)}</div>
              </div>
              <span class="glb-xp">${(m.xp||0).toLocaleString()}</span>
            </div>`).join('')}
      </div>`;
  } else if(tab==='members'){
    const isOwner=g.ownerUid===currentUser.uid;
    content.innerHTML=`
      <div class="members-list">
        ${members.map(([uid,m])=>`
          <div class="member-row">
            ${m.photoURL?`<img src="${m.photoURL}" alt="" class="member-avatar">`:`<div class="member-avatar">${initials(m.name)}</div>`}
            <div class="member-info">
              <div class="member-name">${m.name}${uid===currentUser.uid?' (You)':''}</div>
              <div class="member-sub">${getLevelName(m.xp||0)} · ${(m.xp||0).toLocaleString()} XP</div>
            </div>
            <span class="member-role ${uid===g.ownerUid?'role-owner':'role-member'}">${uid===g.ownerUid?'Owner':'Member'}</span>
            ${isOwner&&uid!==currentUser.uid?`<button class="btn-sm btn-sm-red" style="padding:5px 10px;font-size:11px" onclick="removeMember('${g.id}','${uid}')">Remove</button>`:''}
          </div>`).join('')}
      </div>`;
  } else if(tab==='challenges'){
    loadGroupChallenges(g);
  }
}

async function loadGroupChallenges(g){
  const content=document.getElementById('groupTabContent');
  if(!content) return;
  let challenges=[];
  try{
    const q=query(collection(db,'groups',g.id,'challenges'),orderBy('createdAt','desc'),limit(10));
    const snap=await getDocs(q);
    snap.forEach(d=>challenges.push({id:d.id,...d.data()}));
  }catch(e){}
  const isOwner=g.ownerUid===currentUser.uid;
  const now=Date.now();
  const html=challenges.length===0
    ?`<div class="empty-box"><div class="empty-icon">⚡</div>${isOwner?'No challenges yet. Create one for your group!':'No challenges yet. Ask your group owner to create one!'}</div>`
    :challenges.map(c=>{
        const startMs=c.startAt?.toMillis?.()||0;
        const endMs=c.endAt?.toMillis?.()||0;
        const isLive=now>=startMs&&now<=endMs;
        const isUpcoming=now<startMs;
        const tag=isLive?'active':isUpcoming?'upcoming':'ended';
        const tagLabel=isLive?'🟢 Live':isUpcoming?`⏳ ${Math.round((startMs-now)/60000)}m`:'✅ Ended';
        return `<div class="challenge-card">
          <span class="ch-icon">⚡</span>
          <div class="ch-info">
            <div class="ch-title">${c.title}</div>
            <div class="ch-meta">
              <span>📝 ${c.questionCount||10} questions</span>
              <span>⏱ ${c.durationMins||15} min</span>
            </div>
          </div>
          <div class="ch-action">
            <span class="ch-tag ${tag}">${tagLabel}</span>
            ${isLive?`<a href="/exam/" style="display:block;margin-top:6px;font-size:11px;color:var(--sky2);font-weight:700;text-decoration:none">Join →</a>`:''}
          </div>
        </div>`;
      }).join('');
  content.innerHTML=`
    ${isOwner?`<button class="btn-sm btn-sm-purple" onclick="showCreateChallenge('${g.id}')" style="margin-bottom:16px;display:inline-flex">⚡ New Challenge</button>`:''}
    <div class="challenge-list">${html}</div>`;
}

window.showCreateChallenge=async function(gid){
  const title=prompt('Challenge name:','PSLE Science Sprint');
  if(!title) return;
  const mins=parseInt(prompt('Duration (minutes):','15'))||15;
  const qCount=parseInt(prompt('Number of questions:','10'))||10;
  const startMins=parseInt(prompt('Start in how many minutes?','5'))||5;
  const startAt=new Date(Date.now()+startMins*60000);
  const endAt=new Date(startAt.getTime()+mins*60000);
  try{
    await addDoc(collection(db,'groups',gid,'challenges'),{
      title, durationMins:mins, questionCount:qCount,
      startAt, endAt, createdBy:currentUser.uid,
      createdAt:serverTimestamp()
    });
    showToast('✅ Challenge created!');
    openGroup(gid);
  }catch(e){showToast('❌ Failed to create challenge.');}
};

window.switchGroupTab=function(tab,gid){
  currentGroupTab=tab;
  document.querySelectorAll('.gtab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  // Re-fetch group and render tab
  getDoc(doc(db,'groups',gid)).then(snap=>{
    if(snap.exists()) renderGroupTab({id:gid,...snap.data()},tab);
  });
};

window.copyCode=function(code){
  navigator.clipboard?.writeText(code).then(()=>showToast('📋 Code copied!')).catch(()=>showToast(`Code: ${code}`,4000));
};

window.leaveGroup=async function(gid){
  if(!confirm('Are you sure you want to leave this group?')) return;
  try{
    await updateDoc(doc(db,'groups',gid),{
      memberUids:arrayRemove(currentUser.uid),
      [`members.${currentUser.uid}`]:null
    });
    showToast('Left the group.');
    renderLobby();
  }catch(e){showToast('❌ Could not leave group.');}
};

window.removeMember=async function(gid,uid){
  if(!confirm('Remove this member?')) return;
  try{
    await updateDoc(doc(db,'groups',gid),{
      memberUids:arrayRemove(uid),
      [`members.${uid}`]:null
    });
    showToast('Member removed.');
    openGroup(gid);
  }catch(e){showToast('❌ Could not remove member.');}
};

window.selectEmoji=function(e){selectedEmoji=e;};
window.doSignIn=async()=>{try{await signInWithPopup(auth,provider);}catch(e){}};
window.renderLobby=renderLobby;
window.openGroup=openGroup;

onAuthStateChanged(auth,user=>{
  currentUser=user;
  user ? renderLobby() : renderSignIn();
});

document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
});
</script>
