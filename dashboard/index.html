<style>
:root{
  --bg:#080f1e;--bg2:#0d1629;--card:#0f1c30;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8edf5;--muted:rgba(232,237,245,.5);--dim:rgba(232,237,245,.22);
  --sky:#38bdf8;--sky2:#0ea5e9;--lime2:#84cc16;
  --amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--green:#34d399;
  --p3:#fb923c;--p4:#818cf8;--p5:#34d399;
  --bio:#34d399;--chem:#f472b6;--phys:#a78bfa;
  --r:12px;--rl:18px;--rxl:24px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 clamp(16px,5%,56px);background:rgba(8,15,30,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-brand span{color:var(--sky)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-links a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:8px;transition:all .15s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--sky);background:rgba(56,189,248,.12)}
.npill{padding:5px 12px!important;border-radius:50px!important;font-weight:700!important;font-size:11px!important;color:#fff!important}
.np3{background:var(--p3)!important}.np4{background:var(--p4)!important}
.np5{background:var(--p5)!important;color:#0d1629!important}.npsle{background:var(--sky2)!important}.nsec{background:#7c3aed!important}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;margin-left:8px;border:none;background:none;flex-shrink:0}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(8,15,30,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px clamp(16px,5%,56px);z-index:99;flex-direction:column;gap:6px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:8px;transition:all .15s}
.mobile-menu a:hover{color:#fff;background:rgba(255,255,255,.08)}
.mm-row{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.mm-divider{height:1px;background:var(--border);margin:6px 0}
.mobile-menu .mpill{color:#fff!important;border-radius:50px;padding:8px 16px!important;font-weight:700!important}
.mobile-menu .mp3{background:var(--p3)}.mobile-menu .mp4{background:var(--p4)}
.mobile-menu .mp5{background:var(--p5);color:#0d1629!important}.mobile-menu .mpsle{background:var(--sky2)}.mobile-menu .msec{background:#7c3aed}

/* LAYOUT */
.wrap{max-width:960px;margin:0 auto;padding:80px clamp(16px,5%,48px) 60px}

/* LOADING / NOT-SIGNED-IN STATES */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px}
.state-icon{font-size:56px}
.state-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff}
.state-sub{font-size:15px;color:var(--muted);max-width:380px;line-height:1.6}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:13px 28px;background:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#1f2937;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-google:hover{background:#f1f5f9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-google img{width:20px;height:20px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--sky2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROFILE HEADER */
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:32px;flex-wrap:wrap}
.profile-avatar{width:68px;height:68px;border-radius:50%;border:3px solid rgba(56,189,248,.3);object-fit:cover;flex-shrink:0}
.profile-avatar-placeholder{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--sky2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.profile-info{flex:1;min-width:0}
.profile-name{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-email{font-size:13px;color:var(--muted);margin-top:2px}
.profile-joined{font-size:12px;color:var(--dim);margin-top:2px}
.profile-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-arena{padding:10px 20px;background:var(--sky2);border:none;border-radius:50px;font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-arena:hover{background:#0284c7}
.btn-signout{padding:10px 18px;background:rgba(255,255,255,.06);border:1.5px solid var(--border2);border-radius:50px;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.btn-signout:hover{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-icon{font-size:28px;margin-bottom:8px}
.stat-val{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.stat-card.highlight-xp{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.04)}
.stat-card.highlight-xp .stat-val{color:var(--amber)}
.stat-card.highlight-streak{border-color:rgba(251,146,60,.2);background:rgba(251,146,60,.04)}
.stat-card.highlight-streak .stat-val{color:#fb923c}
.stat-card.highlight-done{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.04)}
.stat-card.highlight-done .stat-val{color:var(--sky)}
.stat-card.highlight-topics{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04)}
.stat-card.highlight-topics .stat-val{color:var(--green)}

/* XP LEVEL BAR */
.level-section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:32px}
.level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.level-label{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff}
.level-next{font-size:12px;color:var(--muted)}
.xp-track{height:10px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden}
.xp-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--amber),#f97316);transition:width .6s ease}
.level-tiers{display:flex;justify-content:space-between;margin-top:8px}
.tier{font-size:10px;color:var(--dim);font-weight:600}

/* SECTION HEADERS */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#fff}
.section-sub{font-size:12px;color:var(--muted)}

/* SUBJECT PROGRESS */
.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.subject-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px;transition:border-color .2s}
.subject-card:hover{border-color:var(--border2)}
.subj-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.subj-icon{font-size:24px}
.subj-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:#fff}
.subj-count{font-size:11px;color:var(--muted);margin-top:1px}
.subj-stat-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}
.subj-stat-row .lbl{color:var(--muted)}
.subj-stat-row .val{font-weight:700;color:#fff}
.subj-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden}
.subj-bar{height:100%;border-radius:50px;transition:width .5s ease}
.subj-bar.bio{background:linear-gradient(90deg,var(--bio),#059669)}
.subj-bar.chem{background:linear-gradient(90deg,var(--chem),#db2777)}
.subj-bar.phys{background:linear-gradient(90deg,var(--phys),#7c3aed)}
.subj-bar.primary{background:linear-gradient(90deg,var(--sky2),var(--lime2))}

/* TOPIC PROGRESS TABLE */
.topic-table{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:32px}
.tt-filters{display:flex;gap:6px;flex-wrap:wrap;padding:16px 20px;border-bottom:1px solid var(--border)}
.tt-tab{padding:5px 14px;border-radius:50px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.tt-tab:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.tt-tab.active{background:var(--sky2);border-color:var(--sky2);color:#fff}
.tt-row{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border);transition:background .15s}
.tt-row:last-child{border-bottom:none}
.tt-row:hover{background:rgba(255,255,255,.03)}
.tt-icon{font-size:20px;flex-shrink:0}
.tt-info{flex:1;min-width:0}
.tt-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-level{font-size:10px;color:var(--muted);margin-top:1px}
.tt-score{flex-shrink:0;text-align:right}
.tt-score-val{font-family:'Sora',sans-serif;font-size:14px;font-weight:800}
.tt-score-pct{font-size:10px;color:var(--muted);margin-top:1px}
.tt-bar-wrap{width:80px;height:5px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden;flex-shrink:0}
.tt-bar{height:100%;border-radius:50px;transition:width .4s}
.tt-not-started{font-size:11px;color:var(--dim);font-style:italic}
.tt-empty{padding:32px 20px;text-align:center;color:var(--muted);font-size:14px}

/* RECENT ACTIVITY */
.activity-list{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:32px}
.activity-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.act-icon{font-size:22px;flex-shrink:0}
.act-info{flex:1}
.act-title{font-size:13px;font-weight:700;color:#fff}
.act-sub{font-size:11px;color:var(--muted);margin-top:2px}
.act-score{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;flex-shrink:0}

/* MOTIVATIONAL FOOTER */
.moti-card{background:linear-gradient(135deg,rgba(14,165,233,.1),rgba(167,139,250,.07));border:1px solid rgba(56,189,248,.15);border-radius:var(--rl);padding:24px;text-align:center;margin-bottom:32px}
.moti-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:#fff;margin-bottom:6px}
.moti-sub{font-size:14px;color:var(--muted)}

/* RESPONSIVE */
@media(max-width:720px){
  .nav-links{display:none}
  .nav-hamburger{display:flex}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .subject-grid{grid-template-columns:1fr}
  .tt-bar-wrap{display:none}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:22px}
}
</style>

  {min:0,    max:199,  name:'Seed',        emoji:'🌱'},
  {min:200,  max:499,  name:'Explorer',    emoji:'🔭'},
  {min:500,  max:999,  name:'Thinker',     emoji:'🧠'},
  {min:1000, max:1999, name:'Scientist',   emoji:'🔬'},
  {min:2000, max:3499, name:'Scholar',     emoji:'📚'},
  {min:3500, max:4999, name:'Expert',      emoji:'⭐'},
  {min:5000, max:7999, name:'Champion',    emoji:'🏆'},
  {min:8000, max:Infinity, name:'Legend',  emoji:'🌟'},
];

function getLevel(xp) {
  return LEVELS.find(l => xp >= l.min && xp <= l.max) || LEVELS[0];
}
function getNextLevel(xp) {
  const idx = LEVELS.findIndex(l => xp >= l.min && xp <= l.max);
  return idx < LEVELS.length - 1 ? LEVELS[idx + 1] : null;
}

// ─── SUBJECT GROUPINGS ────────────────────────────────────────────────────────
const SUBJECTS = [
  { key:'primary', label:'Primary Science', icon:'🌈', color:'primary',
    filter: t => ['p3','p4','p5','psle'].includes(t.level) },
  { key:'bio',  label:'O-Level Biology',   icon:'🧬', color:'bio',
    filter: t => t.level === 'bio' },
  { key:'chem', label:'O-Level Chemistry', icon:'⚗️', color:'chem',
    filter: t => t.level === 'chem' },
  { key:'phys', label:'O-Level Physics',   icon:'🔭', color:'phys',
    filter: t => t.level === 'phys' },
];

// ─── SCORE COLOR ─────────────────────────────────────────────────────────────
function scoreColor(pct) {
  if (pct >= 90) return 'var(--amber)';
  if (pct >= 70) return 'var(--green)';
  if (pct >= 50) return 'var(--sky)';
  return 'var(--red)';
}

// ─── LOCAL FALLBACK ───────────────────────────────────────────────────────────
function loadLocal() {
  try {
    const s = localStorage.getItem('arena_v2');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

// ─── RENDER DASHBOARD ─────────────────────────────────────────────────────────
let currentFilter = 'all';

function renderDashboard(user, data) {
  const xp          = data.xp           || 0;
  const streak      = data.streak       || 0;
  const quizzesDone = data.quizzesDone  || 0;
  const bestScores  = data.bestScores   || {};
  const topicsDone  = Object.keys(bestScores).length;
  const totalTopics = TOPIC_META.length;

  const level     = getLevel(xp);
  const nextLevel = getNextLevel(xp);
  const xpInLevel = xp - level.min;
  const xpToNext  = nextLevel ? nextLevel.min - level.min : 1;
  const pctLevel  = Math.min(100, Math.round((xpInLevel / xpToNext) * 100));

  const wrap = document.getElementById('mainWrap');
  wrap.innerHTML = `
    <!-- PROFILE HEADER -->
    <div class="profile-header">
      ${user.photoURL
        ? `<img src="${user.photoURL}" alt="" class="profile-avatar">`
        : `<div class="profile-avatar-placeholder">👤</div>`}
      <div class="profile-info">
        <div class="profile-name">${user.displayName || 'Student'}</div>
        <div class="profile-email">${user.email || ''}</div>
        <div class="profile-joined">${level.emoji} Level: ${level.name}</div>
      </div>
      <div class="profile-actions">
        <a href="/arena/" class="btn-arena">⚔️ Arena</a>
        <a href="/exam/" class="btn-arena" style="background:#7c3aed">📝 Exam</a>
        <a href="/leaderboard/" class="btn-arena" style="background:rgba(251,191,36,.9);color:#1f2937">🏆 Leaderboard</a>
        <a href="/groups/" class="btn-arena" style="background:var(--bio);color:#0d1629">👥 Groups</a>
        <button class="btn-signout" onclick="doSignOut()">Sign out</button>
      </div>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
      <div class="stat-card highlight-xp">
        <div class="stat-icon">⭐</div>
        <div class="stat-val">${xp.toLocaleString()}</div>
        <div class="stat-label">Total XP</div>
      </div>
      <div class="stat-card highlight-streak">
        <div class="stat-icon">🔥</div>
        <div class="stat-val">${streak}</div>
        <div class="stat-label">Quiz Streak</div>
      </div>
      <div class="stat-card highlight-done">
        <div class="stat-icon">🏆</div>
        <div class="stat-val">${quizzesDone}</div>
        <div class="stat-label">Quizzes Done</div>
      </div>
      <div class="stat-card highlight-topics">
        <div class="stat-icon">🎯</div>
        <div class="stat-val">${topicsDone}<span style="font-size:14px;color:var(--muted)">/${totalTopics}</span></div>
        <div class="stat-label">Topics Attempted</div>
      </div>
    </div>

    <!-- XP LEVEL BAR -->
    <div class="level-section">
      <div class="level-row">
        <div class="level-label">${level.emoji} ${level.name} — Level ${LEVELS.indexOf(level) + 1}</div>
        ${nextLevel
          ? `<div class="level-next">${xp.toLocaleString()} / ${nextLevel.min.toLocaleString()} XP → ${nextLevel.emoji} ${nextLevel.name}</div>`
          : `<div class="level-next" style="color:var(--amber)">🌟 Maximum level reached!</div>`}
      </div>
      <div class="xp-track">
        <div class="xp-fill" style="width:${pctLevel}%"></div>
      </div>
      <div class="level-tiers">
        ${LEVELS.map((l,i) => `<span class="tier">${l.emoji}</span>`).join('')}
      </div>
    </div>

    <!-- SUBJECT PROGRESS -->
    <div class="section-head">
      <div class="section-title">Progress by Subject</div>
      <div class="section-sub">Topics attempted / total</div>
    </div>
    <div class="subject-grid">
      ${SUBJECTS.map(s => {
        const topics    = TOPIC_META.filter(s.filter);
        const attempted = topics.filter(t => bestScores[t.id] != null);
        const pct       = topics.length ? Math.round((attempted.length / topics.length) * 100) : 0;
        const avgScore  = attempted.length
          ? Math.round(attempted.reduce((acc, t) => acc + ((bestScores[t.id] / t.total) * 100), 0) / attempted.length)
          : 0;
        return `<div class="subject-card">
          <div class="subj-top">
            <span class="subj-icon">${s.icon}</span>
            <div>
              <div class="subj-name">${s.label}</div>
              <div class="subj-count">${attempted.length} / ${topics.length} topics</div>
            </div>
          </div>
          <div class="subj-stat-row">
            <span class="lbl">Completion</span>
            <span class="val">${pct}%</span>
          </div>
          <div class="subj-bar-wrap">
            <div class="subj-bar ${s.color}" style="width:${pct}%"></div>
          </div>
          ${attempted.length > 0 ? `
          <div class="subj-stat-row" style="margin-top:10px">
            <span class="lbl">Avg best score</span>
            <span class="val" style="color:${scoreColor(avgScore)}">${avgScore}%</span>
          </div>` : `
          <div class="subj-stat-row" style="margin-top:10px">
            <span class="lbl" style="font-style:italic">Not started yet</span>
            <span></span>
          </div>`}
        </div>`;
      }).join('')}
    </div>

    <!-- TOPIC PROGRESS TABLE -->
    <div class="section-head">
      <div class="section-title">All Topics</div>
      <div class="section-sub">Best score per topic</div>
    </div>
    <div class="topic-table">
      <div class="tt-filters">
        <button class="tt-tab active" onclick="setTTFilter('all',this)">All</button>
        <button class="tt-tab" onclick="setTTFilter('p3',this)">P3</button>
        <button class="tt-tab" onclick="setTTFilter('p4',this)">P4</button>
        <button class="tt-tab" onclick="setTTFilter('p5',this)">P5</button>
        <button class="tt-tab" onclick="setTTFilter('psle',this)">PSLE</button>
        <button class="tt-tab" onclick="setTTFilter('bio',this)">Biology</button>
        <button class="tt-tab" onclick="setTTFilter('chem',this)">Chemistry</button>
        <button class="tt-tab" onclick="setTTFilter('phys',this)">Physics</button>
        <button class="tt-tab" onclick="setTTFilter('done',this)">✅ Attempted</button>
        <button class="tt-tab" onclick="setTTFilter('todo',this)">⬜ Not Started</button>
      </div>
      <div id="topicTableBody"></div>
    </div>

    <!-- MOTIVATIONAL CARD -->
    <div class="moti-card" id="motiCard"></div>
  `;

  // Render topic table
  window._bestScores = bestScores;
  window._currentTTFilter = 'all';
  renderTopicTable('all');
  renderMotiCard(xp, streak, topicsDone, totalTopics, level, bestScores);
}

function renderTopicTable(filter) {
  window._currentTTFilter = filter;
  const bs = window._bestScores || {};
  let topics = TOPIC_META;

  if (filter === 'done') topics = topics.filter(t => bs[t.id] != null);
  else if (filter === 'todo') topics = topics.filter(t => bs[t.id] == null);
  else if (filter === 'psle') topics = topics.filter(t => ['p3','p4','p5','psle'].includes(t.level));
  else if (filter !== 'all') topics = topics.filter(t => t.level === filter);

  const body = document.getElementById('topicTableBody');
  if (!body) return;

  if (topics.length === 0) {
    body.innerHTML = `<div class="tt-empty">No topics match this filter.</div>`;
    return;
  }

  const levelLabel = { p3:'P3', p4:'P4', p5:'P5', psle:'PSLE',
                       bio:'Biology', chem:'Chemistry', phys:'Physics' };
  body.innerHTML = topics.map(t => {
    const best = bs[t.id];
    const pct  = best != null ? Math.round((best / t.total) * 100) : 0;
    return `<div class="tt-row">
      <span class="tt-icon">${t.icon}</span>
      <div class="tt-info">
        <div class="tt-name">${t.title}</div>
        <div class="tt-level">${levelLabel[t.level] || t.level}</div>
      </div>
      ${best != null ? `
        <div class="tt-bar-wrap">
          <div class="tt-bar" style="width:${pct}%;background:${scoreColor(pct)}"></div>
        </div>
        <div class="tt-score">
          <div class="tt-score-val" style="color:${scoreColor(pct)}">${best}/${t.total}</div>
          <div class="tt-score-pct">${pct}%</div>
        </div>
      ` : `
        <div class="tt-not-started">Not attempted</div>
        <a href="/arena/" style="font-size:11px;color:var(--sky2);text-decoration:none;font-weight:700;flex-shrink:0">Start →</a>
      `}
    </div>`;
  }).join('');
}

window.setTTFilter = function(f, el) {
  document.querySelectorAll('.tt-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTopicTable(f);
};

function renderMotiCard(xp, streak, topicsDone, totalTopics, level, bestScores) {
  const card = document.getElementById('motiCard');
  if (!card) return;
  const pct = Math.round((topicsDone / totalTopics) * 100);
  let title, sub;
  if (topicsDone === 0) {
    title = '🚀 Ready to start?';
    sub   = 'Head to the Arena and complete your first topic quiz to start tracking your progress here.';
  } else if (pct === 100) {
    title = '🌟 All 51 topics attempted!';
    sub   = `Incredible — you've tried every single topic. Now aim for 100% on each one.`;
  } else if (streak >= 5) {
    title = `🔥 ${streak}-quiz streak!`;
    sub   = `You're on a roll. Keep scoring 70%+ to extend your streak.`;
  } else if (xp >= 1000) {
    title = `${level.emoji} ${level.name} — keep going!`;
    sub   = `${xp.toLocaleString()} XP earned. ${totalTopics - topicsDone} topics left to attempt.`;
  } else {
    title = `📈 ${pct}% of topics attempted`;
    sub   = `You've started ${topicsDone} of ${totalTopics} topics. Every quiz earns XP — keep practising!`;
  }
  card.innerHTML = `<div class="moti-title">${title}</div><div class="moti-sub">${sub}</div>`;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
window.doSignIn = async function() {
  try { await signInWithPopup(auth, provider); }
  catch(e) { if (e.code !== 'auth/popup-closed-by-user') alert('Sign-in failed.'); }
};

window.doSignOut = async function() {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    // Load from Firestore first, fall back to localStorage
    let data = {};
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        data = snap.data();
      } else {
        // First time sign-in — try to pull from localStorage
        const local = loadLocal();
        if (local) data = local;
      }
    } catch(e) {
      const local = loadLocal();
      if (local) data = local;
    }
    renderDashboard(user, data);
  } else {
    renderSignInScreen();
  }
});
