<style>
:root{
  --bg:#080f1e;--bg2:#0d1629;--card:#0f1c30;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8edf5;--muted:rgba(232,237,245,.5);--dim:rgba(232,237,245,.22);
  --sky:#38bdf8;--sky2:#0ea5e9;--lime2:#84cc16;
  --amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--green:#34d399;
  --p3:#fb923c;--p4:#818cf8;--p5:#34d399;
  --bio:#34d399;--chem:#f472b6;--phys:#a78bfa;
  --r:12px;--rl:18px;--rxl:24px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 clamp(16px,5%,56px);background:rgba(8,15,30,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-brand span{color:var(--sky)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-links a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:8px;transition:all .15s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--sky);background:rgba(56,189,248,.12)}
.npill{padding:5px 12px!important;border-radius:50px!important;font-weight:700!important;font-size:11px!important;color:#fff!important}
.np3{background:var(--p3)!important}.np4{background:var(--p4)!important}
.np5{background:var(--p5)!important;color:#0d1629!important}.npsle{background:var(--sky2)!important}.nsec{background:#7c3aed!important}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;margin-left:8px;border:none;background:none;flex-shrink:0}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(8,15,30,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px clamp(16px,5%,56px);z-index:99;flex-direction:column;gap:6px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:8px;transition:all .15s}
.mobile-menu a:hover{color:#fff;background:rgba(255,255,255,.08)}
.mm-row{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.mm-divider{height:1px;background:var(--border);margin:6px 0}
.mobile-menu .mpill{color:#fff!important;border-radius:50px;padding:8px 16px!important;font-weight:700!important}
.mobile-menu .mp3{background:var(--p3)}.mobile-menu .mp4{background:var(--p4)}
.mobile-menu .mp5{background:var(--p5);color:#0d1629!important}.mobile-menu .mpsle{background:var(--sky2)}.mobile-menu .msec{background:#7c3aed}
.wrap{max-width:840px;margin:0 auto;padding:80px clamp(16px,5%,48px) 60px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--sky2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px}
.state-icon{font-size:52px}.state-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff}
.state-sub{font-size:14px;color:var(--muted);max-width:380px;line-height:1.6}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 26px;background:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#1f2937;cursor:pointer;transition:all .2s}
.btn-google:hover{background:#f1f5f9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-google img{width:18px;height:18px}
/* PAGE HERO */
.page-hero{text-align:center;padding:36px 0 28px}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.page-hero h1{font-family:'Sora',sans-serif;font-size:clamp(22px,4vw,38px);font-weight:800;color:#fff;margin-bottom:8px}
.page-hero h1 span{color:var(--purple)}
.page-hero p{font-size:14px;color:var(--muted);max-width:460px;margin:0 auto}
/* TWO COLUMN */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}
/* SECTION CARD */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:24px;transition:border-color .2s}
.section-card:hover{border-color:var(--border2)}
.sc-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sc-icon{font-size:24px}
.sc-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff}
.sc-sub{font-size:12px;color:var(--muted);margin-top:1px}
/* FORM ELEMENTS */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:var(--r);color:#fff;font-family:inherit;font-size:14px;transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--sky2)}
.form-input option{background:#0d1629;color:#fff}
select.form-input{cursor:pointer}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
/* TOPIC CHECKBOXES */
.topic-picker{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:200px;overflow-y:auto;padding:4px 0}
.topic-check{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--muted)}
.topic-check:hover{border-color:var(--border2);color:#fff}
.topic-check.selected{border-color:var(--purple);background:rgba(167,139,250,.1);color:#fff}
.topic-check input{display:none}
.topic-check-icon{font-size:14px;flex-shrink:0}
/* BUTTONS */
.btn-primary{width:100%;padding:13px;background:var(--purple);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:#fff;cursor:pointer;transition:all .18s;margin-top:4px}
.btn-primary:hover{background:#9061e5;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,.07);border:1.5px solid var(--border2);border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;margin-top:4px}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
/* JOIN CODE INPUT */
.join-code-wrap{display:flex;gap:10px}
.join-code-wrap .form-input{letter-spacing:.15em;text-transform:uppercase;font-weight:700;font-size:18px;text-align:center}
/* ACTIVE EXAMS LIST */
.exam-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.exam-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.exam-card:hover{border-color:var(--border2);background:rgba(255,255,255,.06)}
.exam-card.live{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05)}
.exam-card.upcoming{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.04)}
.ec-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ec-status.live{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.6);animation:glow 1.5s infinite}
.ec-status.upcoming{background:var(--amber)}
.ec-status.ended{background:var(--dim)}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(52,211,153,.4)}50%{box-shadow:0 0 14px rgba(52,211,153,.8)}}
.ec-info{flex:1;min-width:0}
.ec-title{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ec-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.ec-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.tag-live{background:rgba(52,211,153,.15);color:var(--green)}
.tag-upcoming{background:rgba(251,191,36,.15);color:var(--amber)}
.tag-ended{background:rgba(255,255,255,.07);color:var(--muted)}
.ec-action{font-size:12px;font-weight:700;color:var(--sky2);flex-shrink:0;white-space:nowrap}
/* EXAM ROOM */
.exam-room{display:none}
.exam-room.active{display:block}
.room-header{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.room-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:#fff;flex:1}
.room-timer{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;color:var(--amber)}
.room-timer.danger{color:var(--red);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.room-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
/* EXAM COUNTDOWN */
.countdown-box{background:var(--card);border:1px solid rgba(251,191,36,.2);border-radius:var(--rl);padding:36px;text-align:center;margin-bottom:20px}
.cd-label{font-size:13px;color:var(--muted);margin-bottom:10px}
.cd-time{font-family:'Sora',sans-serif;font-size:52px;font-weight:800;color:var(--amber);line-height:1}
.cd-sub{font-size:13px;color:var(--muted);margin-top:8px}
/* EXAM QUESTION */
.exam-q-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:16px}
.exam-q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.exam-q-text{font-size:16px;font-weight:600;color:#fff;line-height:1.55;margin-bottom:18px}
.exam-opts{display:flex;flex-direction:column;gap:8px}
.exam-opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .18s;text-align:left;width:100%}
.exam-opt:hover:not(.locked){border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.06)}
.exam-opt.selected{border-color:var(--purple);background:rgba(167,139,250,.1)}
.exam-opt.correct{border-color:var(--green);background:rgba(52,211,153,.1)}
.exam-opt.wrong{border-color:var(--red);background:rgba(248,113,113,.08)}
.exam-opt.reveal{border-color:var(--green);background:rgba(52,211,153,.06)}
.exam-opt.locked{cursor:default}
.exam-opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0;transition:all .18s}
.exam-opt.selected .exam-opt-letter{background:var(--purple);border-color:var(--purple);color:#fff}
.exam-opt.correct .exam-opt-letter{background:var(--green);border-color:var(--green);color:#0d1629}
.exam-opt.wrong .exam-opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.exam-opt.reveal .exam-opt-letter{background:rgba(52,211,153,.2);border-color:var(--green);color:var(--green)}
.exam-opt-text{font-size:14px;color:var(--text);line-height:1.45;padding-top:1px}
/* EXAM NAV */
.exam-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.q-dot{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.q-dot:hover{border-color:var(--purple);color:#fff}
.q-dot.answered{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
.q-dot.current{background:var(--purple);border-color:var(--purple);color:#fff}
/* EXAM CONTROLS */
.exam-controls{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.btn-prev{padding:11px 20px;background:rgba(255,255,255,.07);border:1.5px solid var(--border2);border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s}
.btn-prev:hover{background:rgba(255,255,255,.12)}
.btn-next-exam{padding:11px 20px;background:var(--purple);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:all .18s;flex:1}
.btn-next-exam:hover{background:#9061e5}
.btn-submit-exam{padding:11px 20px;background:var(--green);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#0d1629;cursor:pointer;transition:all .18s;flex:1}
.btn-submit-exam:hover{background:#10b981}
/* RESULTS */
.exam-results{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:28px;text-align:center;display:none}
.exam-results.show{display:block}
.er-grade{font-family:'Sora',sans-serif;font-size:52px;font-weight:800;margin-bottom:4px}
.er-label{font-size:14px;color:var(--muted);margin-bottom:22px}
.er-stats{display:flex;justify-content:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.er-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;text-align:center}
.er-stat-val{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:#fff}
.er-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.er-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-er{padding:11px 22px;border-radius:50px;font-family:'Sora',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-er-primary{background:var(--purple);border:none;color:#fff}
.btn-er-primary:hover{background:#9061e5}
.btn-er-sec{background:rgba(255,255,255,.07);border:1.5px solid var(--border2);color:var(--text)}
.btn-er-sec:hover{background:rgba(255,255,255,.12)}
/* REVIEW */
.review-section{margin-top:20px;text-align:left}
.review-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-top:1px solid var(--border)}
.ri-icon{font-size:15px;flex-shrink:0;margin-top:2px}
.ri-q{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4}
.ri-ans{font-size:11px;color:var(--muted)}
.ri-correct{color:var(--green)!important}.ri-wrong{color:var(--red)!important}
/* EMPTY */
.empty-box{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:8px}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;z-index:400;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:720px){
  .nav-links{display:none}.nav-hamburger{display:flex}
  .two-col{grid-template-columns:1fr}
  .topic-picker{grid-template-columns:1fr}
}
</style>
</head>

  updateDoc, query, where, orderBy, limit, serverTimestamp, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const FIREBASE_CONFIG = {

  authDomain:        "sciencestar-arena.firebaseapp.com",

};

const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const db       = getFirestore(app);

// Expose to window so functions outside module can use them

window._serverTs      = serverTimestamp;

let currentUser = null;

// ─── TOPIC META (for exam builder) ───────────────────────────────────────────
const TOPIC_META = [
  {id:'living',level:'p3',icon:'🌱',title:'Living & Non-Living Things'},
  {id:'plantparts',level:'p3',icon:'🌿',title:'Plant Parts & Functions'},
  {id:'plants',level:'p3',icon:'🌸',title:'Plants — Growth & Needs'},

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

  el.classList.toggle('selected');

window.createExam = async function() {
  if (!currentUser) { showToast('⚠️ Please sign in first'); return; }
  if (!window.TOPICS || window.TOPICS.length === 0) { showToast('⚠️ Questions not loaded yet, refresh the page'); return; }
  const title    = document.getElementById('examTitle').value.trim();
  const qCount   = parseInt(document.getElementById('examQCount').value);
  const durMins  = parseInt(document.getElementById('examDuration').value);
  const startVal = document.getElementById('examStart').value;
  const selected = [...document.querySelectorAll('.topic-check.selected')].map(el => el.dataset.id);

  if (!title)             { showToast('⚠️ Please enter a title'); return; }
  if (selected.length===0){ showToast('⚠️ Pick at least one topic'); return; }
  if (!startVal)          { showToast('⚠️ Set a start time'); return; }

  // Build question pool from selected topics
  const pool = [];
  selected.forEach(tid => {
    const topic = (window.TOPICS || []).find(t => t.id === tid);
    if (topic) pool.push(...topic.questions.map(q => ({...q, topicId:tid})));
  });
  if (pool.length < qCount) { showToast(`⚠️ Not enough questions. Reduce question count or add more topics.`); return; }

  const shuffled = pool.sort(() => Math.random()-.5).slice(0, qCount);
  const code     = genCode();
  const startTs  = new Date(startVal);

  try {
    const ref = await addDoc(collection(db,'exams'), {
      title,
      code,
      creatorUid:   currentUser.uid,
      creatorName:  currentUser.displayName || 'Anonymous',
      questionCount: qCount,
      durationMins: durMins,
      topicIds:     selected,
      questions:    shuffled,
      scheduledAt:  startTs,
      status:       'scheduled',
      participants: {},
      createdAt:    serverTimestamp()
    });
    showToast(`✅ Exam created! Code: ${code}`, 5000);
    setTimeout(() => renderLobby(), 500);
  } catch(e) {
    console.error('createExam error:', e);
    const msg = e?.code || e?.message || String(e);
    showToast('❌ ' + msg, 6000);
  }
};

// ─── EXAM ROOM ────────────────────────────────────────────────────────────────
function renderExamRoom(examId, exam) {
  const now          = Date.now();
  const scheduledMs  = exam.scheduledAt?.toMillis?.() || 0;
  const secsToStart  = Math.max(0, Math.round((scheduledMs - now) / 1000));
  const totalSecs    = exam.durationMins * 60;
  const questions    = exam.questions || [];

  document.getElementById('mainWrap').innerHTML = `
    <button onclick="renderLobby()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:6px">
      ← Back to Lobby
    </button>
    <div class="room-header">
      <div>
        <div class="room-title">${exam.title}</div>
        <div class="room-meta">
          <span>📝 ${questions.length} questions</span>
          <span>⏱ ${exam.durationMins} min</span>
          <span>Code: <strong style="color:var(--sky)">${exam.code}</strong></span>
          <span>👤 ${exam.creatorName}</span>
        </div>
      </div>
      <div class="room-timer" id="roomTimer">${fmtTime(secsToStart > 0 ? secsToStart : totalSecs)}</div>
    </div>

    ${secsToStart > 0 ? `
    <div class="countdown-box" id="countdownBox">
      <div class="cd-label">Exam starts in</div>
      <div class="cd-time" id="cdTime">${fmtTime(secsToStart)}</div>
      <div class="cd-sub">Get ready! The exam will begin automatically.</div>
    </div>` : ''}

    <div id="examBody" style="${secsToStart > 0 ? 'display:none' : ''}">
      <div class="exam-nav" id="examNav"></div>
      <div id="examQContainer"></div>
      <div class="exam-controls">
        <button class="btn-prev" onclick="examPrev()">← Prev</button>
        <button class="btn-next-exam" id="btnExamNext" onclick="examNext()">Next →</button>
        <button class="btn-submit-exam" id="btnSubmit" onclick="submitExam('${examId}', ${JSON.stringify(exam).replace(/'/g,"\\'")})" style="display:none">Submit Exam ✓</button>
      </div>
    </div>

    <div class="exam-results" id="examResults"></div>`;

  examState = {
    questions, answers:{}, current:0,
    totalSecs, elapsed:0, timer:null,
    examId, submitted:false
  };

  if (secsToStart > 0) {
    // Countdown to start
    let remaining = secsToStart;
    const cdTimer = setInterval(() => {
      remaining--;
      const cdEl = document.getElementById('cdTime');
      const rtEl = document.getElementById('roomTimer');
      if (cdEl) cdEl.textContent = fmtTime(remaining);
      if (rtEl) rtEl.textContent = fmtTime(remaining);
      if (remaining <= 0) {
        clearInterval(cdTimer);
        const cb = document.getElementById('countdownBox');
        const eb = document.getElementById('examBody');
        if (cb) cb.style.display = 'none';
        if (eb) eb.style.display = '';
        startExamTimer(examId, exam, totalSecs);
        renderExamQuestion();
      }
    }, 1000);
  } else {
    startExamTimer(examId, exam, totalSecs);
    renderExamQuestion();
  }
}

function startExamTimer(examId, exam, totalSecs) {
  let remaining = totalSecs;
  const rtEl = document.getElementById('roomTimer');
  examState.timer = setInterval(() => {
    remaining--;
    examState.elapsed++;
    if (rtEl) {
      rtEl.textContent = fmtTime(remaining);
      rtEl.className = remaining <= 300 ? 'room-timer danger' : 'room-timer';
    }
    if (remaining <= 0) {
      clearInterval(examState.timer);
      if (!examState.submitted) submitExam(examId, exam);
    }
  }, 1000);
}

function renderExamQuestion() {
  const qs  = examState.questions;
  const idx = examState.current;
  const q   = qs[idx];
  if (!q) return;

  // Nav dots
  const nav = document.getElementById('examNav');
  if (nav) nav.innerHTML = qs.map((_,i) =>
    `<button class="q-dot ${i===idx?'current':examState.answers[i]!=null?'answered':''}"
      onclick="examGoTo(${i})">${i+1}</button>`
  ).join('');

  // Question
  const letters = ['A','B','C','D'];
  const container = document.getElementById('examQContainer');
  if (!container) return;
  const savedAns = examState.answers[idx];
  container.innerHTML = `
    <div class="exam-q-wrap">
      <div class="exam-q-num">Question ${idx+1} of ${qs.length}</div>
      <div class="exam-q-text">${q.q}</div>
      <div class="exam-opts" id="examOpts">
        ${q.opts.map((o,i) => `
          <button class="exam-opt ${savedAns===i?'selected':''}" onclick="examSelectAnswer(${i})">
            <span class="exam-opt-letter">${letters[i]}</span>
            <span class="exam-opt-text">${o}</span>
          </button>`).join('')}
      </div>
    </div>`;

  // Show/hide next vs submit
  const btnNext   = document.getElementById('btnExamNext');
  const btnSubmit = document.getElementById('btnSubmit');
  if (btnNext && btnSubmit) {
    if (idx === qs.length - 1) {
      btnNext.style.display   = 'none';
      btnSubmit.style.display = '';
    } else {
      btnNext.style.display   = '';
      btnSubmit.style.display = 'none';
    }
  }
}

window.examSelectAnswer = function(optIdx) {
  examState.answers[examState.current] = optIdx;
  renderExamQuestion();
};
window.examNext = function() {
  if (examState.current < examState.questions.length - 1) {
    examState.current++;
    renderExamQuestion();
  }
};
window.examPrev = function() {
  if (examState.current > 0) {
    examState.current--;
    renderExamQuestion();
  }
};
window.examGoTo = function(i) {
  examState.current = i;
  renderExamQuestion();
};

// ─── SUBMIT EXAM ──────────────────────────────────────────────────────────────
window.submitExam = async function(examId, exam) {
  if (examState.submitted) return;
  examState.submitted = true;
  clearInterval(examState.timer);

  const qs      = examState.questions;
  const answers = examState.answers;
  let score     = 0;
  const review  = qs.map((q, i) => {
    const correct = answers[i] === q.ans;
    if (correct) score++;
    return { q:q.q, correct, yours:q.opts[answers[i]]||'No answer', right:q.opts[q.ans], exp:q.exp };
  });

  const pct     = Math.round((score / qs.length) * 100);
  const timeSec = examState.elapsed;

  // Save result to Firestore
  try {
    await updateDoc(doc(db,'exams',examId), {
      [`participants.${currentUser.uid}`]: {
        name:      currentUser.displayName || 'Anonymous',
        photoURL:  currentUser.photoURL || '',
        score,
        total:     qs.length,
        pct,
        timeSec,
        submittedAt: serverTimestamp()
      }
    });
    // XP bonus for exam
    const xpEarned = score * 15 + (pct === 100 ? 100 : 0);
    // Update user's XP in Firestore
    const userRef = doc(db,'users',currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) {
      const cur = userSnap.data();
      await updateDoc(userRef, { xp: (cur.xp||0) + xpEarned });
    }
  } catch(e) { console.warn('Could not save result', e); }

  // Grade color
  const gc = pct>=80?'var(--amber)':pct>=60?'var(--green)':pct>=40?'var(--sky)':'var(--red)';
  const letters = ['A','B','C','D'];

  const resultsEl = document.getElementById('examResults');
  const examBody  = document.getElementById('examBody');
  if (examBody)  examBody.style.display = 'none';
  if (resultsEl) {
    resultsEl.classList.add('show');
    resultsEl.innerHTML = `
      <div class="results-trophy">📋</div>
      <div class="er-grade" style="color:${gc}">${score}/${qs.length}</div>
      <div class="er-label">${pct>=80?'Excellent!':pct>=60?'Good job!':pct>=40?'Keep practising':'Try again!'} — ${pct}%</div>
      <div class="er-stats">
        <div class="er-stat"><div class="er-stat-val" style="color:var(--green)">${score}</div><div class="er-stat-lbl">Correct</div></div>
        <div class="er-stat"><div class="er-stat-val" style="color:var(--red)">${qs.length-score}</div><div class="er-stat-lbl">Wrong</div></div>
        <div class="er-stat"><div class="er-stat-val" style="color:var(--amber)">${Math.floor(timeSec/60)}m ${timeSec%60}s</div><div class="er-stat-lbl">Time</div></div>
      </div>
      <div class="er-actions">
        <a href="/leaderboard/?exam=${examId}" class="btn-er btn-er-primary">🏆 Exam Leaderboard</a>
        <button class="btn-er btn-er-sec" onclick="renderLobby()">← Back to Lobby</button>
      </div>
      <div class="review-section">
        <div class="review-header">Review All Answers</div>
        ${review.map((r,i) => `
          <div class="review-item">
            <span class="ri-icon">${r.correct?'✅':'❌'}</span>
            <div>
              <div class="ri-q">Q${i+1}: ${r.q}</div>
              ${r.correct
                ?`<div class="ri-ans ri-correct">✓ ${r.right}</div>`
                :`<div class="ri-ans ri-wrong">✗ You: ${r.yours}</div>
                  <div class="ri-ans ri-correct">✓ Correct: ${r.right}</div>`}
              <div class="ri-ans" style="font-style:italic;font-size:11px;margin-top:3px">${r.exp}</div>
            </div>
          </div>`).join('')}
      </div>`;
  }
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
window.doSignIn  = async () => { try { await signInWithPopup(auth,provider); } catch(e){} };
window.renderLobby = renderLobby;

onAuthStateChanged(auth, user => {
  currentUser = user; window._currentUser = user;
  user ? renderLobby() : renderSignIn();
});

document.getElementById('hamburger').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
});
</script>
</body>
</html>
