<style>
:root{--bg:#080f1e;--bg2:#0d1629;--card:#0f1c30;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--text:#e8edf5;--muted:rgba(232,237,245,.5);--dim:rgba(232,237,245,.22);--sky:#38bdf8;--sky2:#0ea5e9;--amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--green:#34d399;--p3:#fb923c;--p4:#818cf8;--p5:#34d399;--r:12px;--rl:18px;--rxl:24px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 clamp(16px,5%,56px);background:rgba(8,15,30,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-brand span{color:var(--sky)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-links a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;padding:5px 10px;border-radius:8px;transition:all .15s;white-space:nowrap}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--sky);background:rgba(56,189,248,.12)}
.npill{padding:5px 12px!important;border-radius:50px!important;font-weight:700!important;font-size:11px!important;color:#fff!important}
.np3{background:var(--p3)!important}.npsle{background:var(--sky2)!important}.nsec{background:#7c3aed!important}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;margin-left:8px;border:none;background:none;flex-shrink:0}
.nav-hamburger span{display:block;width:22px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(8,15,30,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px clamp(16px,5%,56px);z-index:99;flex-direction:column;gap:6px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:10px 14px;border-radius:8px;transition:all .15s}
.mobile-menu a:hover{color:#fff;background:rgba(255,255,255,.08)}
.mm-row{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.mm-divider{height:1px;background:var(--border);margin:6px 0}
.mobile-menu .mpill{color:#fff!important;border-radius:50px;padding:8px 16px!important;font-weight:700!important}
.mobile-menu .mp3{background:var(--p3)}.mobile-menu .mpsle{background:var(--sky2)}.mobile-menu .msec{background:#7c3aed}
.wrap{max-width:840px;margin:0 auto;padding:80px clamp(16px,5%,48px) 60px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px}
.state-icon{font-size:52px}.state-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:#fff}
.state-sub{font-size:14px;color:var(--muted);max-width:380px;line-height:1.6}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 26px;background:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#1f2937;cursor:pointer;transition:all .2s}
.btn-google:hover{background:#f1f5f9;transform:translateY(-1px)}
.btn-google img{width:18px;height:18px}
/* HERO */
.page-hero{text-align:center;padding:36px 0 28px}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);border-radius:50px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.page-hero h1{font-family:'Sora',sans-serif;font-size:clamp(22px,4vw,38px);font-weight:800;color:#fff;margin-bottom:8px}
.page-hero h1 span{color:var(--amber)}
.page-hero p{font-size:14px;color:var(--muted);max-width:440px;margin:0 auto}
/* TABS */
.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;justify-content:center}
.tab{padding:8px 18px;border-radius:50px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tab:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.tab.active{background:var(--amber);border-color:var(--amber);color:#0d1629}
/* YOUR RANK CARD */
.your-rank{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(167,139,250,.08));border:1px solid rgba(251,191,36,.25);border-radius:var(--rl);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.yr-rank{font-family:'Sora',sans-serif;font-size:36px;font-weight:800;color:var(--amber);flex-shrink:0;min-width:56px;text-align:center}
.yr-info{flex:1}
.yr-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff}
.yr-sub{font-size:13px;color:var(--muted);margin-top:2px}
.yr-xp{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--amber);flex-shrink:0}
/* LEADERBOARD TABLE */
.lb-table{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:32px}
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.03)}
.lb-row.you{background:rgba(251,191,36,.06);border-left:3px solid var(--amber)}
.lb-pos{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;min-width:32px;text-align:center;flex-shrink:0}
.lb-pos.gold{color:var(--amber)}
.lb-pos.silver{color:#94a3b8}
.lb-pos.bronze{color:#a16207}
.lb-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--sky2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:11px;color:var(--muted);margin-top:2px}
.lb-xp{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--amber);flex-shrink:0}
.lb-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:50px;background:rgba(251,191,36,.15);color:var(--amber);flex-shrink:0}
/* FRIENDS SECTION */
.friends-section{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:24px}
.fs-head{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.friend-search-row{display:flex;gap:10px;margin-bottom:16px}
.friend-input{flex:1;padding:10px 14px;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);border-radius:var(--r);color:#fff;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.friend-input:focus{border-color:var(--sky2)}
.btn-add{padding:10px 18px;background:var(--sky2);border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-add:hover{background:#0284c7}
.friend-list{display:flex;flex-direction:column;gap:8px}
.friend-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r)}
.fr-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--sky2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.fr-info{flex:1}.fr-name{font-size:13px;font-weight:700;color:#fff}.fr-xp{font-size:11px;color:var(--muted)}
.fr-remove{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px;transition:.15s}
.fr-remove:hover{color:var(--red)}
/* EXAM LEADERBOARD */
.exam-lb{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:24px}
.elb-header{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(251,191,36,.05)}
.elb-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#fff}
.elb-sub{font-size:12px;color:var(--muted);margin-top:2px}
.empty-box{text-align:center;padding:32px;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:8px}
@media(max-width:720px){.nav-links{display:none}.nav-hamburger{display:flex}}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc,
  query, where, orderBy, limit, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDpXVBEcrkG7k8qgdWN_NKaqTtHkuxxqTQ",
  authDomain:        "sciencestar-arena.firebaseapp.com",
  projectId:         "sciencestar-arena",
  storageBucket:     "sciencestar-arena.firebasestorage.app",
  messagingSenderId: "399809855699",
  appId:             "1:399809855699:web:424027157b6aa7fc69d426"
};

const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let currentTab  = 'global';
let friends     = []; // array of uids

const LEVELS = [
  {min:0,name:'🌱 Seed'},{min:200,name:'🔭 Explorer'},{min:500,name:'🧠 Thinker'},
  {min:1000,name:'🔬 Scientist'},{min:2000,name:'📚 Scholar'},{min:3500,name:'⭐ Expert'},
  {min:5000,name:'🏆 Champion'},{min:8000,name:'🌟 Legend'}
];
function getLevelName(xp){ return [...LEVELS].reverse().find(l=>xp>=l.min)?.name||'🌱 Seed'; }

function posLabel(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`; }
function posClass(i){ return i===0?'gold':i===1?'silver':i===2?'bronze':''; }

function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

function renderSignIn(){
  document.getElementById('mainWrap').innerHTML=`
    <div class="state-screen">
      <div class="state-icon">🏆</div>
      <div class="state-title">Leaderboard</div>
      <div class="state-sub">Sign in to see where you rank among Science Arena students.</div>
      <button class="btn-google" onclick="doSignIn()">
        <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgiIGhlaWdodD0iMTgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGcgZmlsbD0ibm9uZSIgZmlsbC1ydWxlPSJldmVub2RkIj48cGF0aCBkPSJNMTcuNiA5LjJsLS4xLTEuOEg5djMuNGg0LjhDMTMuNiAxMiAxMyAxMyAxMiAxMy42djIuMmgzYTguOCA4LjggMCAwIDAgMi42LTYuNnoiIGZpbGw9IiM0Mjg1RjQiIGZpbGwtcnVsZT0ibm9uemVybyIvPjxwYXRoIGQ9Ik05IDE4YzIuNCAwIDQuNS0uOCA2LTIuMmwtMy0yLjJhNS40IDUuNCAwIDAgMS04LTIuOUgxVjEzYTkgOSAwIDAgMCA4IDV6IiBmaWxsPSIjMzRBODUzIiBmaWxsLXJ1bGU9Im5vbnplcm8iLz48cGF0aCBkPSJNNCAxMC43YTUuNCA1LjQgMCAwIDEgMC0zLjRWNUgxYTkgOSAwIDAgMCAwIDhsMy0yLjN6IiBmaWxsPSIjRkJCQzA1IiBmaWxsLXJ1bGU9Im5vbnplcm8iLz48cGF0aCBkPSJNOSAzLjZjMS4zIDAgMi41LjQgMy40IDEuM0wxNSAyLjNBOSA5IDAgMCAwIDEgNWwzIDIuNGE1LjQgNS40IDAgMCAxIDUtMy44eiIgZmlsbD0iI0VBNDMzNSIgZmlsbC1ydWxlPSJub256ZXJvIi8+PHBhdGggZD0iTTAgMGgxOHYxOEgweiIvPjwvZz48L3N2Zz4=" alt="G">
        Sign in with Google
      </button>
    </div>`;}

async function renderLeaderboard(tab){
  currentTab=tab;
  const wrap=document.getElementById('mainWrap');

  // Check for exam param
  const examId=new URLSearchParams(location.search).get('exam');

  // Load current user data
  let myData={xp:0,quizzesDone:0};
  try{ const s=await getDoc(doc(db,'users',currentUser.uid)); if(s.exists()) myData=s.data(); }catch(e){}

  // Load friends list from user doc
  friends = myData.friends || [];

  // Build rows based on tab
  let rows=[];
  if(tab==='global'){
    try{
      const q=query(collection(db,'users'),orderBy('xp','desc'),limit(50));
      const snap=await getDocs(q);
      snap.forEach(d=>rows.push({uid:d.id,...d.data()}));
    }catch(e){}
  } else if(tab==='friends'){
    const uids=[currentUser.uid,...friends];
    for(const uid of uids){
      try{ const s=await getDoc(doc(db,'users',uid)); if(s.exists()) rows.push({uid,...s.data()}); }catch(e){}
    }
    rows.sort((a,b)=>(b.xp||0)-(a.xp||0));
  }

  const myRank = rows.findIndex(r=>r.uid===currentUser.uid)+1;

  const rowsHtml = rows.length===0
    ? `<div class="empty-box"><div class="empty-icon">🌱</div>No data yet. Complete quizzes to appear here!</div>`
    : rows.map((r,i)=>{
        const isYou=r.uid===currentUser.uid;
        const avatar=r.photoURL
          ?`<img src="${r.photoURL}" alt="" class="lb-avatar">`
          :`<div class="lb-avatar">${initials(r.displayName)}</div>`;
        return `<div class="lb-row ${isYou?'you':''}">
          <span class="lb-pos ${posClass(i)}">${posLabel(i)}</span>
          ${avatar}
          <div class="lb-info">
            <div class="lb-name">${r.displayName||'Anonymous'}${isYou?' (You)':''}</div>
            <div class="lb-sub">${getLevelName(r.xp||0)} · ${r.quizzesDone||0} quizzes</div>
          </div>
          <span class="lb-xp">${(r.xp||0).toLocaleString()} XP</span>
        </div>`;
      }).join('');

  // Exam leaderboard section
  let examHtml='';
  if(examId){
    try{
      const esnap=await getDoc(doc(db,'exams',examId));
      if(esnap.exists()){
        const exam=esnap.data();
        const parts=Object.entries(exam.participants||{})
          .sort((a,b)=>b[1].pct-a[1].pct||a[1].timeSec-b[1].timeSec);
        examHtml=`
          <div class="exam-lb">
            <div class="elb-header">
              <div class="elb-title">📋 ${exam.title}</div>
              <div class="elb-sub">Exam leaderboard · ${parts.length} participants</div>
            </div>
            ${parts.length===0
              ?`<div class="empty-box">No submissions yet.</div>`
              :parts.map(([uid,p],i)=>`
                <div class="lb-row ${uid===currentUser.uid?'you':''}">
                  <span class="lb-pos ${posClass(i)}">${posLabel(i)}</span>
                  <div class="lb-avatar">${initials(p.name)}</div>
                  <div class="lb-info">
                    <div class="lb-name">${p.name}${uid===currentUser.uid?' (You)':''}</div>
                    <div class="lb-sub">${p.score}/${exam.questionCount||10} correct · ${Math.floor(p.timeSec/60)}m ${p.timeSec%60}s</div>
                  </div>
                  <span class="lb-xp" style="color:var(--green)">${p.pct}%</span>
                </div>`).join('')}
          </div>`;
      }
    }catch(e){}
  }

  // Friends management
  const friendsHtml=`
    <div class="friends-section">
      <div class="fs-head">👥 Friends (${friends.length})</div>
      <div class="friend-search-row">
        <input class="friend-input" id="friendEmail" placeholder="Friend's email address">
        <button class="btn-add" onclick="addFriend()">Add Friend</button>
      </div>
      <div class="friend-list" id="friendList">
        ${friends.length===0
          ?`<div style="font-size:13px;color:var(--muted)">No friends added yet. Add a friend by their email to see them on the leaderboard.</div>`
          :'Loading friends…'}
      </div>
    </div>`;

  wrap.innerHTML=`
    <div class="page-hero">
      <div class="page-badge">🏆 Leaderboard</div>
      <h1>Science Arena <span>Rankings</span></h1>
      <p>See how you compare. XP earned from all Arena quizzes and mock exams.</p>
    </div>

    ${examHtml}

    ${myRank>0?`
    <div class="your-rank">
      <div class="yr-rank">${posLabel(myRank-1)}</div>
      <div class="yr-info">
        <div class="yr-name">${currentUser.displayName||'You'}</div>
        <div class="yr-sub">${getLevelName(myData.xp||0)} · ${myData.quizzesDone||0} quizzes completed</div>
      </div>
      <div class="yr-xp">${(myData.xp||0).toLocaleString()} XP</div>
    </div>`:''}

    <div class="tab-row">
      <button class="tab ${tab==='global'?'active':''}" onclick="switchTab('global')">🌍 Global Top 50</button>
      <button class="tab ${tab==='friends'?'active':''}" onclick="switchTab('friends')">👥 Friends</button>
    </div>

    <div class="lb-table">${rowsHtml}</div>

    ${friendsHtml}`;

  // Load friend details
  if(friends.length>0) loadFriendDetails(friends);
}

async function loadFriendDetails(uids){
  const el=document.getElementById('friendList');
  if(!el) return;
  const items=[];
  for(const uid of uids){
    try{
      const s=await getDoc(doc(db,'users',uid));
      if(s.exists()) items.push({uid,...s.data()});
    }catch(e){}
  }
  if(items.length===0){ el.innerHTML=`<div style="font-size:13px;color:var(--muted)">Could not load friend details.</div>`; return; }
  el.innerHTML=items.map(f=>`
    <div class="friend-row">
      ${f.photoURL?`<img src="${f.photoURL}" alt="" class="fr-avatar">`:`<div class="fr-avatar">${initials(f.displayName)}</div>`}
      <div class="fr-info">
        <div class="fr-name">${f.displayName||'Anonymous'}</div>
        <div class="fr-xp">${(f.xp||0).toLocaleString()} XP · ${getLevelName(f.xp||0)}</div>
      </div>
      <button class="fr-remove" onclick="removeFriend('${f.uid}')" title="Remove friend">✕</button>
    </div>`).join('');
}

window.switchTab = function(tab){ renderLeaderboard(tab); };

window.addFriend = async function(){
  const email=document.getElementById('friendEmail').value.trim().toLowerCase();
  if(!email||!email.includes('@')){ alert('Enter a valid email address.'); return; }
  if(email===currentUser.email){ alert("That's you!"); return; }
  try{
    const q=query(collection(db,'users'),where('email','==',email),limit(1));
    const snap=await getDocs(q);
    if(snap.empty){ alert('No Science Arena user found with that email. They need to sign in first.'); return; }
    const friendUid=snap.docs[0].id;
    if(friends.includes(friendUid)){ alert('Already added!'); return; }
    friends.push(friendUid);
    await updateDoc(doc(db,'users',currentUser.uid),{friends});
    alert('Friend added! ✅');
    renderLeaderboard(currentTab);
  }catch(e){ alert('Could not add friend. Please try again.'); }
};

window.removeFriend = async function(uid){
  friends=friends.filter(f=>f!==uid);
  await updateDoc(doc(db,'users',currentUser.uid),{friends});
  renderLeaderboard(currentTab);
};

window.doSignIn=async()=>{ try{ await signInWithPopup(auth,provider); }catch(e){} };

onAuthStateChanged(auth, user=>{
  currentUser=user;
  user ? renderLeaderboard('global') : renderSignIn();
});

document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
});
</script>
</body>
</html>
